# ==========================================
# SERVER
# ==========================================
server.port=${PORT:8001}

# ==========================================
# APPLICATION
# ==========================================
spring.application.name=auth-service
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# ==========================================
# DATABASE - H2 In-Memory
# ==========================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.defer-datasource-initialization=true

# ==========================================
# H2 CONSOLE
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# EXTERNAL SERVICES
# ==========================================
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8007/api/notifications}

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:aB3cD7eF2gH9iJ4kL6mN8oP1qR5sT0uV}
jwt.expiration=${JWT_EXPIRATION:86400000}
